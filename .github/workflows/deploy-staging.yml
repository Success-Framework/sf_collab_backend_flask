name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy staging on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/sf_collab_backend_flask
            git fetch origin develop
            git checkout develop
            git pull --ff-only origin develop
            docker compose -f docker-compose-staging.yml up -d --build --remove-orphans
            docker compose -f docker-compose-staging.yml ps
            docker compose -f docker-compose-staging.yml logs --tail=60 api-staging
