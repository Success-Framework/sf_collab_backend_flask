services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sfcollab-api
    ports:
      - "5001:5000"
    env_file:
      - ../.env.development
    environment:
      FLASK_ENV: development
    volumes:
      - ../:/app 
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
    command: flask run --host=0.0.0.0 --port=5000 --reload 
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sfcollab_net
  db:
    image: mysql:8.0.35
    container_name: sfcollab-mysql
    env_file:
      - ../.env.development
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: defaultdb
      MYSQL_USER: sfcollab
      MYSQL_PASSWORD: sfcollab_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/init_utf8.sql:/docker-entrypoint-initdb.d/init_utf8.sql:ro
    networks:
      - sfcollab_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    container_name: sfcollab-redis
    ports:
      - "6379:6379"
    networks:
      - sfcollab_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysqldata:

networks:
  sfcollab_net:
    driver: bridge
