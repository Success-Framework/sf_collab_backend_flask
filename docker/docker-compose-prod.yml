services:
  # ===== API SERVICE =====
  api:
    image: ivandagomez/sforger_api:latest
    container_name: sfcollab-api
    ports:
      - "5000:5000"  # Internal only, Nginx will handle external traffic
    env_file:
      - .env.production
    environment:
      FLASK_ENV: production
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ===== MYSQL =====
  db:
    image: mysql:8.0.35
    container_name: sfcollab-mysql
    environment:
      MYSQL_DATABASE: defaultdb
      MYSQL_USER: sfcollab
      MYSQL_PASSWORD: sfcollab_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "&&", "mysql", "-u", "sfcollab", "-psfcollab_pass", "-e", "SELECT COUNT(*) FROM defaultdb.posts"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== REDIS =====
  redis:
    image: redis:7
    container_name: sfcollab-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysqldata: