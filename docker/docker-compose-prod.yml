version: "3.8"

services:
  api:
    image: sforger_api:latest
    container_name: sfcollab-api
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    environment:
      FLASK_ENV: production
      PORT: 5000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: sfcollab-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: defaultdb
      MYSQL_USER: sfcollab
      MYSQL_PASSWORD: sfcollab_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: sfcollab-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysqldata:
